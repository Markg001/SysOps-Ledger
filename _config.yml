# ===============================
# Site Configuration
# ===============================

theme: jekyll-theme-chirpy

lang: en

timezone: Africa/Nairobi

title: Mr Mark
tagline: >-
  Most people don’t even know what sysadmins do, but trust me, if they all 
  took a lunch break at the same time they wouldn’t make it to the deli before 
  you ran out of bullets protecting your canned goods from roving bands of mutants.


description: >-
  A practical record of my experience as a System Administrator, covering
  how I manage infrastructure, handle day-to-day operations, and resolve system issues.
  This includes server administration, automation, monitoring, and real-world troubleshooting
  strategies used in live environments.

url: "https://github.com/Markg001"
baseurl: "/SysOps-Ledger"

