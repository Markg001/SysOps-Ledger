# ===============================
# Site Verification (optional)
# ===============================

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# ===============================
# Analytics (optional)
# ===============================

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

# ===============================
# Appearance Settings
# ===============================

theme_mode:

cdn:

avatar: https://media.licdn.com/dms/image/v2/D4D03AQEhs0x3pjlyTA/profile-displayphoto-scale_200_200/B4DZ0zujo.IAAY-/0/1774689343646?e=1778112000&v=beta&t=-8buVnbYtAmWW9O-N3lDMQ8wUok9Gdf1mWQ_O0rjF1c

social_preview_image:

toc: true

# ===============================
# Comments System (disabled)
# ===============================

comments:
  provider:

  disqus:
    shortname:

  utterances:
    repo:
    issue_term:

  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping: pathname
    strict: "0"
    input_position: bottom
    lang:
    reactions_enabled: "1"

# ===============================
# PWA Settings
# ===============================

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

# ===============================
# Pagination
# ===============================

paginate: 10

# ===============================
# Markdown / Kramdown
# ===============================

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# ===============================
# Collections
# ===============================

collections:
  tabs:
    output: true
    sort_by: order

# ===============================
# Defaults
# ===============================

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# ===============================
# SASS
# ===============================

sass:
  style: compressed

# ===============================
# HTML Compression
# ===============================

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# ===============================
# Exclusions
# ===============================

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# ===============================
# Jekyll Archives
# ===============================

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/